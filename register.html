<!DOCTYPE html>
<html>
<head>
    <title>Register - AI Attendance Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 400px;
        }
        h1 { color: #667eea; text-align: center; }
        input { margin: 10px 0; padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 100%; }
        button { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
<div class="register-card">
    <h1>🎓 Create Account</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">
        <a href="/login" style="color: #667eea;">Back to Login</a>
    </p>
</div>
</body>
</html>
